<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Specter</title>
<style>
:root{--bg:#0a0f0d;--surface:#111a14;--border:#1e2e22;--text:#f0fdf4;--muted:#6b7280;--accent:#4ade80;--accent-dark:#22c55e;--red:#f87171;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6}
.container{width:100%;max-width:440px}
.logo{text-align:center;margin-bottom:32px}
.logo a{text-decoration:none;display:inline-flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:18px}
.logo-text{font-size:22px;font-weight:700;color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px}
h1{font-size:24px;font-weight:700;margin-bottom:6px;text-align:center}
.subtitle{color:var(--muted);text-align:center;margin-bottom:28px;font-size:15px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;margin-top:16px;color:var(--text)}
input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted);opacity:.4}
.btn{width:100%;padding:14px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;margin-top:24px;font-family:inherit}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}
.btn-primary:disabled{opacity .5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.link{display:block;text-align:center;margin-top:16px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:500}
.link:hover{color:var(--accent-dark)}
.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;display:none}
.success{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--accent);padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;display:none}
.password-note{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<a href="/">
  <div class="logo-icon">S</div>
  <span class="logo-text">Specter</span>
</a>
</div>
<div class="card">
<h1>Create your account</h1>
<p class="subtitle">Start your 7-day free trial. No credit card required.</p>

<div id="error" class="error"></div>
<div id="success" class="success"></div>

<form id="signupForm">
  <label for="email">Work email</label>
  <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
  
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Create a password" required minlength="8" autocomplete="new-password">
  <div class="password-note">Minimum 8 characters</div>
  
  <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
</form>

<a href="/login" class="link">Already have an account? Log in</a>
</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@latest';

const SUPABASE_URL = 'https://ccepbmjmlpwqtxzdoeha.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7UKggNhqagkbA9ROJdHGQg_LNppjFCw';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const errorDiv = document.getElementById('error');
  const successDiv = document.getElementById('success');
  
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  errorDiv.style.display = 'none';
  successDiv.style.display = 'none';
  
  try {
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: { emailRedirectTo: `${window.location.origin}/onboarding` }
    });
    
    if (error) throw error;
    
    successDiv.textContent = '✓ Account created! Check your email to verify, then choose your plan.';
    successDiv.style.display = 'block';
    document.getElementById('signupForm').reset();
  } catch (err) {
    errorDiv.textContent = err.message;
    errorDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
